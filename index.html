<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CalcDesk</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Theme Button -->

    <button id="themeBtn">
        🌙
    </button>

    <!-- Live Clock -->

    <div class="clock">

        <i class="fa-regular fa-clock"></i>

        <span id="clock">10:30 AM</span>

    </div>

    <!-- Background Decorations -->

    <div class="notebook"></div>

    <div class="sticky sticky1"></div>

    <div class="sticky sticky2"></div>

    <div class="coffee">
        ☕
    </div>

    <div class="plant">

        <div class="pot"></div>

        <div class="leaf leaf1"></div>

        <div class="leaf leaf2"></div>

        <div class="leaf leaf3"></div>

    </div>

    <div class="pencil"></div>

    <div class="ruler"></div>

    <!-- Calculator -->

    <div class="calculator">

        <h2>🧮 CalcDesk</h2>

        <p class="tagline">

            Smart Calculations, Simplified.

        </p>

        <!-- Display -->

        <div class="display">

            <div id="expression">

                0

            </div>

            <div id="result">

                0

            </div>

        </div>

        <!-- Buttons -->

        <div class="buttons">
                    <!-- First Row -->

        <button class="special">AC</button>
        <button class="special">DEL</button>
        <button class="operator">%</button>
        <button class="operator">/</button>

        <!-- Second Row -->

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">*</button>

        <!-- Third Row -->

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">-</button>

        <!-- Fourth Row -->

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">+</button>

        <!-- Fifth Row -->

        <button class="zero">0</button>
        <button>.</button>
        <button class="equal">=</button>

    </div>

</div>

<footer>

    <p>
        © 2026 CalcDesk • Built using HTML, CSS & JavaScript
    </p>

</footer>

<script src="script.js"></script>

</body>

</html>
